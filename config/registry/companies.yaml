# ── Company Registry ──────────────────────────────────────────────────────────
# This is the source of truth for every company JobZo knows about.
#
# Fields:
#   primary_category     – Exactly one from categories.yaml
#   secondary_categories – Zero or more from categories.yaml
#   stage                – Startup | Growth | Enterprise
#   offices              – List of location names matching locations.yaml
#   hiring_regions       – List of region names (India, Remote, US, Europe, Global)
#   ats                  – List of ATS types matching ats.yaml
#   careers_url          – Human-friendly careers page URL
#   job_listing_url      – Machine-parsed job listing URL (used by CompanyPagesProvider)
#   fresher_friendly     – bool: does this company hire freshers?
#   internship           – bool: does this company offer internships?
#   remote_policy        – Remote | Hybrid | On-site
#   backend_stack        – List of technologies from technologies.yaml
#   hiring_patterns      – Relative hiring demand by role type (High/Medium/Low)
#   interview            – Estimated difficulty (1-10), OA flag, system design flag
#   salary               – Salary bands in LPA (min/max for fresher, intern)
#   priority             – High | Medium | Low (for search ranking)
#   tags                 – Free-form tags for discovery/filtering
#   confidence           – How confident we are in this company's data (0-1)

