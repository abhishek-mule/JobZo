# Skill Relationship Graph
# Defines weighted relationships between skills for intelligent matching.
#
# parents:    prerequisite skills (with strength 0-1)
# complements: commonly paired skills (with strength 0-1)
# The graph is used for:
#   - Skill expansion: given "Spring Boot", find Java, REST, Docker, etc.
#   - Gap analysis: missing parent skills reduce confidence
#   - Complement suggestion: "You know Kafka? You might also like Redis"

